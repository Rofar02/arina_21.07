<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>С Днём Рождения ♥</title>

<script>
/* ============================================================
   СТАРТ — приглашение к квесту (открывается по QR с зеркала)
   Тексты и следующая страница — можно поправить при желании.
   ============================================================ */
const NEXT_PAGE = "quest1.html"; // куда ведёт кнопка «Я готова»

const CONFIG = {
  EYEBROW: "Сегодня твой день",
  TITLE: "С Днём Рождения, любимая! 🎉",
  MESSAGE: "Я приготовил для тебя маленькое приключение — несколько шагов, и каждый приведёт к следующему сюрпризу.\n\nГотова начать?",
  BUTTON_TEXT: "Я готова"
};
</script>

<style>
  :root{
    --bg1:#fff5f7;
    --bg2:#ffd9e3;
    --accent:#d6789a;
    --accent-dark:#a84568;
    --text:#5a2f3d;
    --card-bg:#fffafc;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100vh;}
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background-image:linear-gradient(160deg,var(--bg1),var(--bg2)), url("первая страница/bg-optimized.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-blend-mode:soft-light;
    background-attachment:fixed;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    padding:24px;
    text-align:center;
    color:var(--text);
    position:relative;
    overflow-y:auto;
  }

  .card{
    position:relative;
    z-index:1;
    max-width:480px;
    width:100%;
    background:var(--card-bg);
    border-radius:28px;
    padding:44px 28px;
    box-shadow:0 20px 60px rgba(168,69,104,0.22);
  }
  .eyebrow{
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--accent);
    opacity:0.75;
    margin-bottom:14px;
    font-weight:600;
  }
  h1{
    font-size:clamp(28px,7.5vw,38px);
    line-height:1.3;
    margin:0 0 22px;
    font-weight:700;
  }
  .message{
    font-size:clamp(18px,4.8vw,21px);
    line-height:1.6;
    margin:0 0 34px;
    white-space:pre-line;
    font-weight:600;
  }
  button{
    font-size:clamp(20px,5.5vw,26px);
    font-weight:700;
    padding:18px 40px;
    width:100%;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:#fff;
    box-shadow:0 12px 30px rgba(168,69,104,.4);
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  button:active{
    transform:scale(0.96);
    box-shadow:0 6px 18px rgba(168,69,104,.4);
  }
  .heart{
    font-size:40px;
    margin-bottom:10px;
    display:block;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="heart">♥</span>
    <div class="eyebrow" id="eyebrow"></div>
    <h1 id="title"></h1>
    <p class="message" id="message"></p>
    <button id="btn"></button>
  </div>

<script>
  document.getElementById("eyebrow").textContent = CONFIG.EYEBROW;
  document.getElementById("title").textContent = CONFIG.TITLE;
  document.getElementById("message").textContent = CONFIG.MESSAGE;
  const btn = document.getElementById("btn");
  btn.textContent = CONFIG.BUTTON_TEXT;
  btn.addEventListener("click", () => {
    window.location.href = NEXT_PAGE;
  });
</script>
</body>
</html>
