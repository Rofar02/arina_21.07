<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Столик ждёт ♥</title>

<script>
/* ============================================================
   ШАГ 3 — "КАФЕ"
   Впиши свои данные ниже — только эти две строки нужно менять.
   ============================================================ */
const CAFE_NAME    = "Рафчик coffee";   // например: "Кофейня Луна"
const CAFE_ADDRESS = "ул. Кирова 45а";      // например: "пр. Мира, 5"

/* Остальной текст экрана — можно тоже поправить при желании */
const CONFIG = {
  TITLE: "Столик уже ждёт",
  MESSAGE_TEMPLATE: "Загляни в {CAFE_NAME} —\nтебя там уже ждут.",
  HINT: "Закажи что-нибудь вкусное и загляни в конверт, который тебе передадут ♥"
};
</script>

<style>
  :root{
    --bg1:#fbf1e6;
    --bg2:#e9d3b8;
    --accent:#a9714a;
    --accent-dark:#6f4423;
    --text:#4a2f1d;
    --card-bg:#fffaf3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100vh;}
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background-image:linear-gradient(160deg,var(--bg1),var(--bg2)), url("кофейня/kofe_stolik_chashka_119666_1600x1200.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-blend-mode:soft-light;
    background-attachment:fixed;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    padding:24px;
    text-align:center;
    color:var(--text);
    position:relative;
    overflow-y:auto;
  }

  .card{
    position:relative;
    z-index:1;
    max-width:480px;
    width:100%;
    background:var(--card-bg);
    border-radius:28px;
    padding:40px 26px;
    box-shadow:0 20px 60px rgba(90,61,46,0.18);
  }
  .step{
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--accent);
    opacity:0.7;
    margin-bottom:14px;
    font-weight:600;
  }
  h1{
    font-size:clamp(28px,7vw,38px);
    line-height:1.25;
    margin:0 0 20px;
    font-weight:700;
  }
  p.message{
    font-size:clamp(19px,5.2vw,24px);
    line-height:1.55;
    margin:0 0 26px;
    white-space:pre-line;
    font-weight:600;
  }
  .details{
    background:#f3e4cf;
    border-radius:18px;
    padding:20px 18px;
    margin-bottom:22px;
    text-align:left;
  }
  .details .row{
    display:flex;
    align-items:flex-start;
    gap:12px;
    font-size:clamp(17px,4.6vw,20px);
    line-height:1.4;
    font-weight:600;
  }
  .details .icon{font-size:22px;flex-shrink:0;}
  .maps-link{
    display:inline-block;
    margin-top:4px;
    font-size:16px;
    color:var(--accent-dark);
    text-decoration:underline;
    font-weight:600;
  }
  .hint{
    font-size:clamp(16px,4.2vw,18px);
    line-height:1.5;
    color:var(--accent-dark);
    opacity:0.85;
    font-weight:600;
    margin-top:6px;
  }
  .heart{
    font-size:34px;
    margin-bottom:8px;
    display:block;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="heart">♥</span>
    <div class="step">Шаг 3 из 4</div>
    <h1 id="title"></h1>
    <p class="message" id="message"></p>
    <div class="details">
      <div class="row">
        <span class="icon">📍</span>
        <div>
          <div id="addressRow"></div>
          <a class="maps-link" id="mapsLink" href="#" target="_blank" rel="noopener">Показать на карте</a>
        </div>
      </div>
    </div>
    <div class="hint" id="hint"></div>
  </div>

<script>
  document.getElementById("title").textContent = CONFIG.TITLE;
  document.getElementById("message").textContent = CONFIG.MESSAGE_TEMPLATE
    .replace("{CAFE_NAME}", CAFE_NAME);
  document.getElementById("addressRow").textContent = CAFE_NAME + ", " + CAFE_ADDRESS;
  document.getElementById("mapsLink").href =
    "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(CAFE_NAME + " " + CAFE_ADDRESS);
  document.getElementById("hint").textContent = CONFIG.HINT;
</script>
</body>
</html>
