<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Я жду тебя ♥</title>

<script>
/* ============================================================
   ШАГ 4 — "ТЕРМОЛЕНД" (финальный экран)
   Впиши свои данные ниже — только эти строки нужно менять.
   ============================================================ */
const PLACE_NAME    = "Termoland";   // например: "Термоленд"
const PLACE_ADDRESS = "ТРЦ Планета, улица Доз, 10а";      // например: "ул. Тёплая, 1"

/* Картинки сертификатов — файлы должны лежать рядом с этим файлом */
const TERMA1_SRC     = "terma1.webp";
const TERMA1_CAPTION = "Сертификат 1";
const TERMA2_SRC     = "terma2.webp";
const TERMA2_CAPTION = "Сертификат 2";

/* Остальной текст экрана — можно тоже поправить при желании */
const CONFIG = {
  TITLE: "Я жду тебя здесь",
  REASSURANCE: "Ничего брать с собой не нужно — я обо всём уже позаботился. Тебе остаётся только приехать ♥",
  CLOSING: "Только я, ты и остаток этого дня ♥"
};
</script>

<style>
  :root{
    --bg1:#eaf7f7;
    --bg2:#c3e9ec;
    --accent:#2ea7b0;
    --accent-dark:#1c6e77;
    --text:#0f3d42;
    --card-bg:#f6fdfd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100vh;}
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background-image:linear-gradient(160deg,var(--bg1),var(--bg2)), url("термоленд/bg-optimized.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-blend-mode:soft-light;
    background-attachment:fixed;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    padding:24px;
    text-align:center;
    color:var(--text);
    position:relative;
    overflow-y:auto;
  }

  .card{
    position:relative;
    z-index:1;
    max-width:480px;
    width:100%;
    background:var(--card-bg);
    border-radius:28px;
    padding:46px 28px;
    box-shadow:0 20px 60px rgba(15,61,66,0.22);
  }
  .step{
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--accent);
    opacity:0.7;
    margin-bottom:14px;
    font-weight:600;
  }
  h1{
    font-size:clamp(30px,7.5vw,40px);
    line-height:1.25;
    margin:0 0 26px;
    font-weight:700;
  }
  .details{
    background:#e2f3f4;
    border-radius:18px;
    padding:22px 18px;
    margin-bottom:24px;
    text-align:left;
  }
  .details .row{
    display:flex;
    align-items:flex-start;
    gap:12px;
    font-size:clamp(18px,4.8vw,22px);
    line-height:1.4;
    font-weight:700;
  }
  .details .row + .row{margin-top:14px;}
  .details .icon{font-size:24px;flex-shrink:0;}
  .maps-link{
    display:inline-block;
    margin-top:6px;
    font-size:16px;
    color:var(--accent-dark);
    text-decoration:underline;
    font-weight:600;
  }
  .reassurance{
    font-size:clamp(16px,4.3vw,19px);
    line-height:1.55;
    color:var(--accent-dark);
    background:#dff2f3;
    border-radius:16px;
    padding:16px 18px;
    margin-bottom:26px;
    font-weight:600;
  }
  .certs{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:center;
    margin-bottom:26px;
  }
  .cert-card{
    flex:1 1 150px;
    max-width:170px;
    background:#fff;
    border-radius:16px;
    padding:8px;
    box-shadow:0 10px 24px rgba(15,61,66,0.18);
    border:2px solid #cdeef0;
  }
  .cert-card img{
    display:block;
    width:100%;
    height:auto;
    border-radius:10px;
    cursor:zoom-in;
    transition:transform .15s ease;
  }
  .cert-card img:active{
    transform:scale(0.97);
  }
  .zoom-hint{
    font-size:11px;
    color:#7fa3a7;
    margin-top:4px;
  }
  #lightbox{
    position:fixed;
    inset:0;
    background:rgba(10,30,32,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:200;
    padding:24px;
    cursor:zoom-out;
  }
  #lightbox.show{
    display:flex;
  }
  #lightbox img{
    max-width:min(90vw,560px);
    max-height:90vh;
    border-radius:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  }
  .cert-card figcaption{
    margin:8px 0 2px;
    font-size:14px;
    font-weight:700;
    color:var(--accent-dark);
  }
  .closing{
    font-size:clamp(18px,4.8vw,21px);
    line-height:1.6;
    color:var(--accent-dark);
    white-space:pre-line;
    font-weight:700;
  }
  .heart{
    font-size:40px;
    margin-bottom:10px;
    display:block;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="heart">♥</span>
    <div class="step">Финал</div>
    <h1 id="title"></h1>
    <div class="details">
      <div class="row">
        <span class="icon">📍</span>
        <div>
          <div id="placeName"></div>
          <div id="placeAddress"></div>
          <a class="maps-link" id="mapsLink" href="#" target="_blank" rel="noopener">Показать на карте</a>
        </div>
      </div>
    </div>
    <div class="reassurance" id="reassurance"></div>
    <div class="certs">
      <figure class="cert-card">
        <img id="terma1Img" src="" alt="">
        <figcaption id="terma1Caption"></figcaption>
        <div class="zoom-hint">🔍 нажми, чтобы увеличить</div>
      </figure>
      <figure class="cert-card">
        <img id="terma2Img" src="" alt="">
        <figcaption id="terma2Caption"></figcaption>
        <div class="zoom-hint">🔍 нажми, чтобы увеличить</div>
      </figure>
    </div>
    <div class="closing" id="closing"></div>
  </div>

  <div id="lightbox">
    <img id="lightboxImg" src="" alt="">
  </div>

<script>
  document.getElementById("title").textContent = CONFIG.TITLE;
  document.getElementById("placeName").textContent = PLACE_NAME;
  document.getElementById("placeAddress").textContent = PLACE_ADDRESS;
  document.getElementById("mapsLink").href =
    "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(PLACE_NAME + " " + PLACE_ADDRESS);
  document.getElementById("reassurance").textContent = CONFIG.REASSURANCE;

  document.getElementById("terma1Img").src = TERMA1_SRC;
  document.getElementById("terma1Img").alt = TERMA1_CAPTION;
  document.getElementById("terma1Caption").textContent = TERMA1_CAPTION;
  document.getElementById("terma2Img").src = TERMA2_SRC;
  document.getElementById("terma2Img").alt = TERMA2_CAPTION;
  document.getElementById("terma2Caption").textContent = TERMA2_CAPTION;

  document.getElementById("closing").textContent = CONFIG.CLOSING;

  var lightbox = document.getElementById("lightbox");
  var lightboxImg = document.getElementById("lightboxImg");
  document.querySelectorAll(".cert-card img").forEach(function (img) {
    img.addEventListener("click", function () {
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      lightbox.classList.add("show");
    });
  });
  lightbox.addEventListener("click", function () {
    lightbox.classList.remove("show");
  });
</script>
</body>
</html>
